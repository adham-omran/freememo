# Self-host bundle — FreeMemo app + Postgres.
#
# Quick start:
#   1. cp .env.example .env  &&  edit secrets
#   2. docker compose -f self-host.yml up -d
#
# Defaults: storage caps disabled (unlimited). Override via .env if you want quotas.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: freememo:latest
    container_name: freememo-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=cardmaker
      - DB_USER=cardmaker
      - DB_PASSWORD=${DB_PASSWORD:-changeme}

      # Session cookie encryption (required for prod). Generate: openssl rand -hex 32
      - ENC_KEY_SECRET=${ENC_KEY_SECRET:-change-me-in-env-file}

      # Storage — 0 = unlimited (self-host default). Set to N bytes to enforce a cap.
      - STORAGE_QUOTA_BYTES=${STORAGE_QUOTA_BYTES:-0}
      - STORAGE_PER_FILE_MAX_BYTES=${STORAGE_PER_FILE_MAX_BYTES:-0}

      # Public base URL — used in Anki card "source" anchors and any self-link.
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8080}

      # Google OAuth (sign-in). Without these, /auth/google returns 503.
      # Get credentials from https://console.cloud.google.com/apis/credentials
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8080/auth/google/callback}

      # Server
      - PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # JVM
      - JAVA_OPTS=-Xmx1g -Xms512m
    depends_on:
      db:
        condition: service_healthy
    networks:
      - freememo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16-alpine
    container_name: freememo-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=cardmaker
      - POSTGRES_USER=cardmaker
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Localhost-only. Remove if you don't need DB access from the host.
      - "127.0.0.1:5432:5432"
    networks:
      - freememo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardmaker -d cardmaker"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      # Performance tuning — adjust to your host's resources.
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=4MB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB

networks:
  freememo-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local

# Notes:
# - For HTTPS, put nginx or Caddy in front of port 8080 (see README).
# - Postgres is reachable only on 127.0.0.1:5432 from the host.
# - Storage caps default to unlimited; override per env above.
# - Backup:  docker compose -f self-host.yml exec db pg_dump -U cardmaker cardmaker > backup.sql
# - Restore: cat backup.sql | docker compose -f self-host.yml exec -T db psql -U cardmaker cardmaker
