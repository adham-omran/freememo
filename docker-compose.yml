  services:
    postgres:
      image: postgres:16-alpine
      environment:
        POSTGRES_DB: cardmaker
        POSTGRES_USER: cardmaker
        # Defaults to "dev" for the local dev quickstart. For prod/self-host, set
        # DB_PASSWORD in .env BEFORE the first `up` (Postgres fixes it at init and
        # cannot rotate it via env afterward).
        POSTGRES_PASSWORD: "${DB_PASSWORD:-dev}"
      ports:
        - "5432:5432"
      volumes:
        - pgdata:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U cardmaker"]
        interval: 5s
        timeout: 5s
        retries: 5
  volumes:
    pgdata:
