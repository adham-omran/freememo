# Production Docker Compose Configuration
# Electric Card Maker - VPS Deployment

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: electric-card-maker:latest
    container_name: card-maker-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database connection (must match db service below)
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=cardmaker
      - DB_USER=cardmaker
      - DB_PASSWORD=${DB_PASSWORD:-changeme}

      # JVM options
      - JAVA_OPTS=-Xmx1g -Xms512m
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cardmaker-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16-alpine
    container_name: card-maker-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=cardmaker
      - POSTGRES_USER=cardmaker
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      # Persistent database storage
      - postgres-data:/var/lib/postgresql/data

      # Optional: custom PostgreSQL configuration
      # - ./postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      # Expose PostgreSQL only on localhost (remove if not needed)
      - "127.0.0.1:5432:5432"
    networks:
      - cardmaker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardmaker -d cardmaker"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      # Performance tuning (adjust based on VPS resources)
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=4MB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB

networks:
  cardmaker-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local

# Usage:
#
# 1. Create .env file with:
#    DB_PASSWORD=your-secure-password
#    POSTGRES_PASSWORD=your-secure-password
#
# 2. Build and start services:
#    docker compose -f docker-compose.prod.yml up -d --build
#
# 3. View logs:
#    docker compose -f docker-compose.prod.yml logs -f
#
# 4. Stop services:
#    docker compose -f docker-compose.prod.yml down
#
# 5. Backup database:
#    docker compose -f docker-compose.prod.yml exec db pg_dump -U cardmaker cardmaker > backup.sql
#
# 6. Restore database:
#    cat backup.sql | docker compose -f docker-compose.prod.yml exec -T db psql -U cardmaker cardmaker
#
# 7. Update and restart:
#    git pull
#    docker compose -f docker-compose.prod.yml up -d --build
#
# Notes:
# - Database data persists in 'postgres-data' volume
# - App requires DB_HOST, DB_PORT, etc. environment variables (modify src/electric_starter_app/db.clj first)
# - PostgreSQL is only accessible from within Docker network (not exposed externally)
# - Use a reverse proxy (nginx/Caddy) in front of port 8080 for HTTPS
# - Adjust PostgreSQL settings based on your VPS resources
