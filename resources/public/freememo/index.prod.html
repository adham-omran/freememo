<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="utf-8"/>
	<title>FreeMemo</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="color-scheme" content="light dark">
	<link rel="stylesheet" href="/freememo/index.css" type="text/css" media="screen" />
	<link rel="icon" type="image/svg+xml" href="/freememo/favicon.svg">
	<link rel="apple-touch-icon" sizes="180x180" href="/freememo/favicon.svg">

	<!-- PDF.js Core + Viewer -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>
	<script>
	    if (typeof pdfjsLib !== 'undefined') {
		pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
	    }
	</script>

	<!-- highlight.js — required by Quill 2 syntax module. MUST load before quill.js -->
	<!-- No theme CSS — freememo-anki.css + index.css own the palette. -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
	<!-- Clojure language pack (not in the common bundle). MUST load after highlight.min.js -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/clojure.min.js"></script>

	<!-- Quill Rich Text Editor (alternative to TipTap, better CDN support) -->
	<!-- snow: card-field editors (quill_field). bubble: main doc editor (floating-on-selection toolbar). -->
	<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.bubble.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
	<!-- Konva — canvas library for the image-occlusion mask editor (freememo.occlusion-editor) -->
	<script src="https://cdn.jsdelivr.net/npm/konva@9.3.16/konva.min.js"></script>
	<!-- Quill overrides now in index.css (with dark mode support) -->

	<!-- Score kind: waveform + regions (freememo.score-wavesurfer) and
	     client-side MP3 clip encoding (freememo.score-audio) -->
	<script src="https://cdn.jsdelivr.net/npm/wavesurfer.js@7.8.6/dist/wavesurfer.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/wavesurfer.js@7.8.6/dist/plugins/regions.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>

	<!-- Ensure cache busting on deployment – inject main.BUILD-HASH.js -->
	<!-- $key$ is a template string. See src-prod/prod.cljc/wrap-prod-index-page -->
	<script defer type="text/javascript" src="/freememo/$:hyperfiddle.client.module/main$"></script>
    </head>
    <body></body>
</html>
